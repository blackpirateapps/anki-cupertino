name: Build Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android host project
        run: flutter create --platforms android --project-name anki_cupertino --org com.blackpirateapps .

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze app
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anki-cupertino-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
